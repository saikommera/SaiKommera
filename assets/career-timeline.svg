<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180" width="800" height="180">
  <rect width="800" height="180" fill="#0d1117" rx="12"/>
  <text x="400" y="22" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#8b949e">── Career Timeline ──</text>

  <!-- Horizontal timeline line -->
  <line x1="60" y1="90" x2="740" y2="90" stroke="#21262d" stroke-width="2"/>

  <!-- Animated progress fill left to right -->
  <line x1="60" y1="90" x2="60" y2="90" stroke="#1f6feb" stroke-width="2">
    <animate attributeName="x2" from="60" to="740" dur="3s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
  </line>

  <!-- Node 1: DXC Technology -->
  <circle cx="160" cy="90" r="10" fill="#0d1117" stroke="#3fb950" stroke-width="2">
    <animate attributeName="r" values="10;14;10" dur="3s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="stroke" values="#3fb950;#56d364;#3fb950" dur="3s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="160" cy="90" r="5" fill="#3fb950"/>
  <!-- DXC label above -->
  <rect x="85" y="30" width="150" height="48" fill="#161b22" stroke="#3fb950" stroke-width="1" rx="6" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1s" fill="freeze"/>
  </rect>
  <text x="160" y="47" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#56d364" opacity="0">
    DXC Technology<animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1s" fill="freeze"/>
  </text>
  <text x="160" y="60" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e" opacity="0">
    DevOps Engineer<animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1s" fill="freeze"/>
  </text>
  <text x="160" y="72" text-anchor="middle" font-family="monospace" font-size="8" fill="#484f58" opacity="0">
    Jul 2020 – Jul 2023<animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1s" fill="freeze"/>
  </text>
  <!-- DXC date below line -->
  <text x="160" y="112" text-anchor="middle" font-family="monospace" font-size="9" fill="#484f58" opacity="0">
    3 years<animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1s" fill="freeze"/>
  </text>

  <!-- Node 2: M.S. Education -->
  <circle cx="370" cy="90" r="10" fill="#0d1117" stroke="#a371f7" stroke-width="2" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
    <animate attributeName="r" values="10;14;10" dur="3s" begin="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="370" cy="90" r="5" fill="#a371f7" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
  </circle>
  <rect x="292" y="110" width="156" height="48" fill="#161b22" stroke="#a371f7" stroke-width="1" rx="6" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
  </rect>
  <text x="370" y="126" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#bc8cff" opacity="0">
    M.S. Comp. Science<animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
  </text>
  <text x="370" y="139" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e" opacity="0">
    Univ. of Arkansas (STEM)<animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
  </text>
  <text x="370" y="151" text-anchor="middle" font-family="monospace" font-size="8" fill="#484f58" opacity="0">
    Aug 2023 – May 2025<animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
  </text>

  <!-- Node 3: Deloitte -->
  <circle cx="560" cy="90" r="10" fill="#0d1117" stroke="#1f6feb" stroke-width="2" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2s" fill="freeze"/>
    <animate attributeName="r" values="10;14;10" dur="3s" begin="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="560" cy="90" r="5" fill="#1f6feb" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2s" fill="freeze"/>
  </circle>
  <rect x="478" y="30" width="164" height="48" fill="#161b22" stroke="#1f6feb" stroke-width="1" rx="6" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2s" fill="freeze"/>
  </rect>
  <text x="560" y="47" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#58a6ff" opacity="0">
    Deloitte<animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2s" fill="freeze"/>
  </text>
  <text x="560" y="60" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e" opacity="0">
    DevOps / SRE Engineer<animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2s" fill="freeze"/>
  </text>
  <text x="560" y="72" text-anchor="middle" font-family="monospace" font-size="8" fill="#484f58" opacity="0">
    Jan 2025 – Apr 2026<animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2s" fill="freeze"/>
  </text>

  <!-- Node 4: Entra Solutions / NOW -->
  <circle cx="720" cy="90" r="12" fill="#0d1117" stroke="#56d364" stroke-width="3" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2.5s" fill="freeze"/>
    <animate attributeName="r" values="12;18;12" dur="2s" begin="2.5s" repeatCount="indefinite"/>
    <animate attributeName="stroke" values="#56d364;#3fb950;#56d364" dur="2s" begin="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="720" cy="90" r="6" fill="#56d364" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2.5s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0.4;1" dur="1.5s" begin="2.5s" repeatCount="indefinite"/>
  </circle>
  <rect x="632" y="110" width="154" height="55" fill="#161b22" stroke="#56d364" stroke-width="1" rx="6" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2.5s" fill="freeze"/>
  </rect>
  <text x="716" y="125" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#56d364" opacity="0">
    Entra Solutions<animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2.5s" fill="freeze"/>
  </text>
  <text x="716" y="138" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e" opacity="0">
    DevOps Developer<animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2.5s" fill="freeze"/>
  </text>
  <text x="716" y="150" text-anchor="middle" font-family="monospace" font-size="8" fill="#56d364" opacity="0">
    May 2026 – Present<animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2.5s" fill="freeze"/>
  </text>
  <text x="716" y="160" text-anchor="middle" font-family="monospace" font-size="8" fill="#56d364" opacity="0">
    🟢 Currently here<animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2.5s" fill="freeze"/>
  </text>
</svg>
