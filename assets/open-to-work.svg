<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 44" width="280" height="44">
  <rect width="280" height="44" fill="#161b22" rx="22"/>
  <rect width="280" height="44" fill="#1f6feb" rx="22" opacity="0">
    <animate attributeName="opacity" values="0;0.06;0" dur="2s" repeatCount="indefinite"/>
  </rect>

  <!-- Pulse rings around green dot -->
  <circle cx="24" cy="22" r="6" fill="none" stroke="#3fb950" stroke-width="1.5" opacity="0.8">
    <animate attributeName="r" values="6;14;6" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="24" cy="22" r="6" fill="none" stroke="#3fb950" stroke-width="1" opacity="0.5">
    <animate attributeName="r" values="6;20;6" dur="2s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="2s" begin="0.3s" repeatCount="indefinite"/>
  </circle>

  <!-- Green dot -->
  <circle cx="24" cy="22" r="6" fill="#3fb950"/>
  <circle cx="24" cy="22" r="3" fill="#56d364"/>

  <!-- Text -->
  <text x="42" y="18" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="600" fill="#e6edf3">Open to Work</text>
  <text x="42" y="33" font-family="monospace" font-size="10" fill="#8b949e">Senior DevOps · SRE · Platform Engineer</text>
</svg>
