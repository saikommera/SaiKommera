<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" width="800" height="160">
  <rect width="800" height="160" fill="#0d1117"/>

  <!-- Star dots -->
  <circle cx="50"  cy="20"  r="1" fill="white" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="150" cy="50"  r="1" fill="white" opacity="0.3"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/></circle>
  <circle cx="300" cy="15"  r="1.5" fill="white" opacity="0.5"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="4s" repeatCount="indefinite"/></circle>
  <circle cx="450" cy="70"  r="1" fill="white" opacity="0.3"><animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.5s" repeatCount="indefinite"/></circle>
  <circle cx="600" cy="30"  r="1.5" fill="white" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="3.5s" repeatCount="indefinite"/></circle>
  <circle cx="720" cy="55"  r="1" fill="white" opacity="0.6"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.8s" repeatCount="indefinite"/></circle>
  <circle cx="100" cy="130" r="1" fill="white" opacity="0.3"><animate attributeName="opacity" values="0.3;0.6;0.3" dur="2.8s" repeatCount="indefinite"/></circle>
  <circle cx="500" cy="140" r="1.5" fill="white" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="3.2s" repeatCount="indefinite"/></circle>
  <circle cx="750" cy="120" r="1" fill="white" opacity="0.5"><animate attributeName="opacity" values="0.5;0.2;0.5" dur="2.2s" repeatCount="indefinite"/></circle>

  <!-- Floating tech keyword badges — drift up slowly -->
  <text x="60"  y="80" font-family="monospace" font-size="11" fill="#1f6feb" opacity="0.7">
    kubernetes
    <animate attributeName="y" values="80;60;80" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="8s" repeatCount="indefinite"/>
  </text>
  <text x="180" y="50" font-family="monospace" font-size="11" fill="#ff9900" opacity="0.6">
    terraform
    <animate attributeName="y" values="50;30;50" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="10s" repeatCount="indefinite"/>
  </text>
  <text x="310" y="100" font-family="monospace" font-size="11" fill="#3fb950" opacity="0.7">
    argocd
    <animate attributeName="y" values="100;80;100" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="7s" repeatCount="indefinite"/>
  </text>
  <text x="430" y="40" font-family="monospace" font-size="11" fill="#e6522c" opacity="0.6">
    prometheus
    <animate attributeName="y" values="40;20;40" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="9s" repeatCount="indefinite"/>
  </text>
  <text x="570" y="90" font-family="monospace" font-size="11" fill="#7b42bc" opacity="0.7">
    hashicorp-vault
    <animate attributeName="y" values="90;70;90" dur="11s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="11s" repeatCount="indefinite"/>
  </text>
  <text x="700" y="60" font-family="monospace" font-size="11" fill="#2496ed" opacity="0.6">
    docker
    <animate attributeName="y" values="60;40;60" dur="8.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="8.5s" repeatCount="indefinite"/>
  </text>
  <text x="100" y="130" font-family="monospace" font-size="10" fill="#58a6ff" opacity="0.5">
    github-actions
    <animate attributeName="y" values="130;110;130" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="12s" repeatCount="indefinite"/>
  </text>
  <text x="360" y="148" font-family="monospace" font-size="10" fill="#e3b341" opacity="0.5">
    opentelemetry
    <animate attributeName="y" values="148;128;148" dur="9.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="9.5s" repeatCount="indefinite"/>
  </text>
  <text x="620" y="140" font-family="monospace" font-size="10" fill="#ef7b4d" opacity="0.5">
    helm
    <animate attributeName="y" values="140;120;140" dur="7.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="7.5s" repeatCount="indefinite"/>
  </text>

  <!-- Center glow text -->
  <text x="400" y="90" text-anchor="middle"
    font-family="monospace" font-size="22" font-weight="bold"
    fill="#e6edf3" opacity="0.08">SENIOR  DEVOPS  /  SRE  ENGINEER</text>
</svg>
