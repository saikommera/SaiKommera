<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" width="800" height="160">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117">
        <animate attributeName="stop-color" values="#0d1117;#0a1628;#0d1628;#0d1117" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#1f3a5f">
        <animate attributeName="stop-color" values="#1f3a5f;#2d1b69;#1a4a3a;#1f3a5f" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#161b22">
        <animate attributeName="stop-color" values="#161b22;#0d1117;#161b22;#161b22" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <rect width="800" height="160" fill="url(#grad1)" rx="0"/>

  <!-- Floating particles -->
  <circle cx="50" cy="40" r="2" fill="#1f6feb" opacity="0.6">
    <animate attributeName="cy" values="40;20;40" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="80" r="1.5" fill="#3fb950" opacity="0.5">
    <animate attributeName="cy" values="80;50;80" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="680" cy="60" r="2" fill="#a371f7" opacity="0.5">
    <animate attributeName="cy" values="60;30;60" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="730" cy="100" r="1.5" fill="#58a6ff" opacity="0.4">
    <animate attributeName="cy" values="100;70;100" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="30" r="1" fill="#e3b341" opacity="0.4">
    <animate attributeName="cy" values="30;10;30" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- Main name text with shimmer -->
  <text x="400" y="72" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif"
    font-size="40" font-weight="bold" fill="#e6edf3" letter-spacing="2">
    Sai Babji Kommera
  </text>

  <!-- Shimmer overlay on name -->
  <rect x="0" y="35" width="80" height="50" fill="url(#shimmer)" opacity="0.15">
    <animate attributeName="x" values="-80;880" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
  </rect>

  <!-- Subtitle -->
  <text x="400" y="100" text-anchor="middle"
    font-family="monospace" font-size="14" fill="#8b949e" letter-spacing="1">
    Senior DevOps / SRE · Platform Engineer · Cloud Engineer · DevSecOps
  </text>

  <!-- Animated underline -->
  <rect x="200" y="112" width="0" height="2" fill="#1f6feb" rx="1">
    <animate attributeName="width" from="0" to="400" dur="1.5s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
    <animate attributeName="x" from="400" to="200" dur="1.5s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
  </rect>

  <!-- Bottom metrics strip -->
  <rect x="0" y="130" width="800" height="30" fill="#161b22" opacity="0.6"/>
  <text x="133" y="150" text-anchor="middle" font-family="monospace" font-size="11" fill="#56d364">⚡ 40% Faster Releases</text>
  <text x="333" y="150" text-anchor="middle" font-family="monospace" font-size="11" fill="#58a6ff">📈 +25% Uptime</text>
  <text x="500" y="150" text-anchor="middle" font-family="monospace" font-size="11" fill="#e3b341">💰 22% Cost Saved</text>
  <text x="667" y="150" text-anchor="middle" font-family="monospace" font-size="11" fill="#bc8cff">🔐 ISO 27001 · SOC 2</text>

  <!-- Separator lines -->
  <line x1="230" y1="135" x2="230" y2="158" stroke="#30363d" stroke-width="1"/>
  <line x1="415" y1="135" x2="415" y2="158" stroke="#30363d" stroke-width="1"/>
  <line x1="580" y1="135" x2="580" y2="158" stroke="#30363d" stroke-width="1"/>
</svg>
