  <rect x="546" y="38" width="235" height="185" fill="#161b22" stroke="#326ce5" stroke-width="1.5" rx="8"/>
  <text x="663" y="58" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#58a6ff">🖥  Node: ip-10-0-3-88</text>
