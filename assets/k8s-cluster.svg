  <text x="680" y="157" font-family="monospace" font-size="7" fill="#56d364">Running</text>

  <rect x="556" y="170" width="200" height="30" fill="#0d1117" stroke="#56d364" stroke-width="1" rx="5"/>
  <circle cx="567" cy="185" r="4" fill="#56d364"><animate attributeName="opacity" values="1;0.4;1" dur="3.1s" repeatCount="indefinite"/></circle>
