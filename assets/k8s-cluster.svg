  <text x="417" y="157" font-family="monospace" font-size="7" fill="#56d364">Running</text>

  <rect x="293" y="170" width="200" height="30" fill="#0d1117" stroke="#56d364" stroke-width="1" rx="5"/>
  <circle cx="304" cy="185" r="4" fill="#56d364"><animate attributeName="opacity" values="1;0.4;1" dur="1.9s" repeatCount="indefinite"/></circle>
  <text x="313" y="183" font-family="monospace" font-size="8" fill="#e6edf3">otel-collector-daemonset</text>
  <text x="313" y="195" font-family="monospace" font-size="7" fill="#56d364">Running</text>

