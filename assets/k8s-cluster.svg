  <text x="556" y="126" font-family="monospace" font-size="9" fill="#484f58">PODS (3/3 Running)</text>

  <rect x="556" y="132" width="96" height="30" fill="#0d1117" stroke="#56d364" stroke-width="1" rx="5"/>
  <circle cx="567" cy="147" r="4" fill="#56d364"><animate attributeName="opacity" values="1;0.4;1" dur="2.7s" repeatCount="indefinite"/></circle>
