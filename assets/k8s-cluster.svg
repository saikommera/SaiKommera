<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="800" height="240">
  <rect width="800" height="240" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="400" y="24" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#8b949e">⎈  Live Kubernetes Cluster  ·  Amazon EKS  ·  3 Nodes  ·  99.9% Uptime</text>

  <!-- Node 1 -->
  <rect x="20" y="38" width="235" height="185" fill="#161b22" stroke="#326ce5" stroke-width="1.5" rx="8"/>
  <text x="137" y="58" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#58a6ff">🖥  Node: ip-10-0-1-42</text>
  <text x="137" y="72" text-anchor="middle" font-family="monospace" font-size="9" fill="#484f58">m5.xlarge  ·  us-east-1a</text>

