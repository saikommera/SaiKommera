<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1f6feb" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dark background -->
  <rect width="400" height="400" fill="#0d1117" rx="16"/>
  <circle cx="200" cy="200" r="180" fill="url(#glow)"/>

  <!-- Orbit rings -->
  <circle cx="200" cy="200" r="80"  fill="none" stroke="#1f6feb" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.4"/>
  <circle cx="200" cy="200" r="130" fill="none" stroke="#3fb950" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3"/>
  <circle cx="200" cy="200" r="170" fill="none" stroke="#a371f7" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.2"/>

  <!-- Center hub: SRE -->
  <circle cx="200" cy="200" r="38" fill="#161b22" stroke="#1f6feb" stroke-width="2"/>
  <circle cx="200" cy="200" r="38" fill="#1f6feb" opacity="0">
    <animate attributeName="opacity" values="0;0.15;0" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="200" y="196" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="13" fill="#58a6ff">SRE</text>
  <text x="200" y="211" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b949e">Platform</text>

  <!-- Inner orbit: AWS, K8s, Terraform (r=80) -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="12s" repeatCount="indefinite"/>
    <!-- AWS -->
    <circle cx="280" cy="200" r="26" fill="#1a1f27" stroke="#ff9900" stroke-width="1.5"/>
    <text x="280" y="196" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#ff9900">AWS</text>
    <text x="280" y="208" text-anchor="middle" font-family="monospace" font-size="7" fill="#8b949e">Cloud</text>
  </g>
  <g>
    <animateTransform attributeName="transform" type="rotate" from="120 200 200" to="480 200 200" dur="12s" repeatCount="indefinite"/>
    <!-- Kubernetes -->
    <circle cx="280" cy="200" r="26" fill="#1a1f27" stroke="#326ce5" stroke-width="1.5"/>
    <text x="280" y="196" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#326ce5">K8s</text>
    <text x="280" y="208" text-anchor="middle" font-family="monospace" font-size="7" fill="#8b949e">EKS</text>
  </g>
  <g>
    <animateTransform attributeName="transform" type="rotate" from="240 200 200" to="600 200 200" dur="12s" repeatCount="indefinite"/>
    <!-- Terraform -->
    <circle cx="280" cy="200" r="26" fill="#1a1f27" stroke="#7b42bc" stroke-width="1.5"/>
    <text x="280" y="196" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#a371f7">Tf</text>
    <text x="280" y="208" text-anchor="middle" font-family="monospace" font-size="7" fill="#8b949e">IaC</text>
  </g>

  <!-- Middle orbit: Docker, Helm, ArgoCD, GitOps (r=130, slower, reverse) -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="-360 200 200" dur="20s" repeatCount="indefinite"/>
    <circle cx="330" cy="200" r="22" fill="#1a1f27" stroke="#2496ed" stroke-width="1.5"/>
    <text x="330" y="196" text-anchor="middle" font-family="monospace" font-size="8" font-weight="bold" fill="#2496ed">Docker</text>
    <text x="330" y="207" text-anchor="middle" font-family="monospace" font-size="7" fill="#8b949e">Containers</text>
  </g>
  <g>
    <animateTransform attributeName="transform" type="rotate" from="90 200 200" to="-270 200 200" dur="20s" repeatCount="indefinite"/>
    <circle cx="330" cy="200" r="22" fill="#1a1f27" stroke="#0f1689" stroke-width="1.5"/>
    <text x="330" y="196" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#58a6ff">Helm</text>
    <text x="330" y="207" text-anchor="middle" font-family="monospace" font-size="7" fill="#8b949e">Charts</text>
  </g>
  <g>
    <animateTransform attributeName="transform" type="rotate" from="180 200 200" to="-180 200 200" dur="20s" repeatCount="indefinite"/>
    <circle cx="330" cy="200" r="22" fill="#1a1f27" stroke="#ef7b4d" stroke-width="1.5"/>
    <text x="330" y="196" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#ef7b4d">Argo</text>
    <text x="330" y="207" text-anchor="middle" font-family="monospace" font-size="7" fill="#8b949e">GitOps</text>
  </g>
  <g>
    <animateTransform attributeName="transform" type="rotate" from="270 200 200" to="-90 200 200" dur="20s" repeatCount="indefinite"/>
    <circle cx="330" cy="200" r="22" fill="#1a1f27" stroke="#e6522c" stroke-width="1.5"/>
    <text x="330" y="196" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#e6522c">Prom</text>
    <text x="330" y="207" text-anchor="middle" font-family="monospace" font-size="7" fill="#8b949e">SLO</text>
  </g>

  <!-- Outer orbit: Datadog, Vault, Python, Ansible (r=170, fast) -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="30s" repeatCount="indefinite"/>
    <circle cx="370" cy="200" r="18" fill="#1a1f27" stroke="#632ca6" stroke-width="1"/>
    <text x="370" y="204" text-anchor="middle" font-family="monospace" font-size="8" fill="#a371f7">DD</text>
  </g>
  <g>
    <animateTransform attributeName="transform" type="rotate" from="60 200 200" to="420 200 200" dur="30s" repeatCount="indefinite"/>
    <circle cx="370" cy="200" r="18" fill="#1a1f27" stroke="#ffcc00" stroke-width="1"/>
    <text x="370" y="204" text-anchor="middle" font-family="monospace" font-size="8" fill="#ffcc00">Vault</text>
  </g>
  <g>
    <animateTransform attributeName="transform" type="rotate" from="120 200 200" to="480 200 200" dur="30s" repeatCount="indefinite"/>
    <circle cx="370" cy="200" r="18" fill="#1a1f27" stroke="#3776ab" stroke-width="1"/>
    <text x="370" y="204" text-anchor="middle" font-family="monospace" font-size="8" fill="#3776ab">Py</text>
  </g>
  <g>
    <animateTransform attributeName="transform" type="rotate" from="180 200 200" to="540 200 200" dur="30s" repeatCount="indefinite"/>
    <circle cx="370" cy="200" r="18" fill="#1a1f27" stroke="#ee0000" stroke-width="1"/>
    <text x="370" y="204" text-anchor="middle" font-family="monospace" font-size="8" fill="#ff7b72">Ans</text>
  </g>
  <g>
    <animateTransform attributeName="transform" type="rotate" from="240 200 200" to="600 200 200" dur="30s" repeatCount="indefinite"/>
    <circle cx="370" cy="200" r="18" fill="#1a1f27" stroke="#4ea94b" stroke-width="1"/>
    <text x="370" y="204" text-anchor="middle" font-family="monospace" font-size="8" fill="#56d364">OPA</text>
  </g>
  <g>
    <animateTransform attributeName="transform" type="rotate" from="300 200 200" to="660 200 200" dur="30s" repeatCount="indefinite"/>
    <circle cx="370" cy="200" r="18" fill="#1a1f27" stroke="#4ea94b" stroke-width="1"/>
    <text x="370" y="204" text-anchor="middle" font-family="monospace" font-size="7" fill="#56d364">Grafana</text>
  </g>
</svg>
